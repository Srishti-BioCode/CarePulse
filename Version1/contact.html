<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - CarePulse</title>
    <style>
        /* 1. Animation Define Karein */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 2. Poore Body par Animation Apply Karein */
body {
    animation: fadeIn 0.8s ease-out;
}

/* 3. Link Click Transition (Optional) */
a {
    transition: all 0.3s ease;
}

a:hover {
    transform: translateY(-2px);
    filter: brightness(1.2);
}
        body { background: rgb(158, 128, 133); color: white; font-family: sans-serif; text-align: center; padding: 5%; }
        .contact-box { background: rgb(48, 44, 44); padding: 40px; border-radius: 20px; display: inline-block; width: 100%; max-width: 600px; border: 2px solid #00C48C; }
        .call-btn { display: block; background: #6fc400; color: white; padding: 20px; font-size: 25px; text-decoration: none; border-radius: 15px; margin-top: 20px; font-weight: bold; }
        input, textarea { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="contact-box">
        <h1 style="font-size: 40px;">Humein Call Karein</h1>
        <p style="font-size: 20px; color: #bbb;">Koi bhi sawal ho, niche diye button par click karein.</p>
        
        <a href="tel:+911234567890" class="call-btn">📞 Abhi Call Karein</a>
        
        <hr style="margin: 30px 0; border: 1px solid #333;">
        
        <h3>Ya Humein Message Bhejein:</h3>
        <input type="text" placeholder="Aapka Naam">
        <input type="tel" placeholder="Phone Number">
        <textarea placeholder="Aapka Message" rows="4"></textarea>
        <button style="background: #FF7A59; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 20px;">Message Bhejein</button>
        <br><br>
        <a href="index.html" style="color: #00C48C; text-decoration: none;">← Home par wapas jayein</a>
    </div>
</body>
<script>
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', e => {
        // Sirf internal links ke liye (jo dusre page par le jayein)
        if (link.hostname === window.location.hostname && link.hash === "") {
            e.preventDefault();
            let destination = link.href;
            
            // Body ko fade out karein
            document.body.style.opacity = '0';
            document.body.style.transition = '0.5s';
            
            // 0.5 second baad naya page kholein
            setTimeout(() => {
                window.location.href = destination;
            }, 500);
        }
    });
});
window.handleContactSubmit = async function(event) {
    event.preventDefault();
    const cName = document.querySelector('input[placeholder="Aapka Naam"]').value;
    const cPhone = document.querySelector('input[placeholder="Phone Number"]').value;
    const cMessage = document.querySelector('input[placeholder="Aapka Message"]').value;

    try {
        await addDoc(collection(db, "contactMessages"), {
            name: cName,
            phone: cPhone,
            message: cMessage,
            timestamp: new Date()
        });
        alert("Aapka sandesh hum tak pahunch gaya hai!");
        event.target.reset();
    } catch (e) {
        alert("Bhejne mein galti hui: " + e.message);
    }
};
</script>

  window.handleFormSubmit = async function(event) {

    const name = document.querySelector('input[placeholder="Naam likhein"]').value;

    try {
