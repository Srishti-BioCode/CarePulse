<!DOCTYPE html>
<html>
    <body>
    <div id="smart-health-card" style="padding: 15px; background: #e0f7fa; border-radius: 15px; border: 2px solid #00acc1; margin: 15px;">
    
    <div style="text-align: center; border-bottom: 1px dashed #00acc1; padding-bottom: 10px;">
        <h3 style="margin: 0; color: #006064;">💧 Water & Health</h3>
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px 0;">
            <button onclick="changeWater(-1)" style="width: 40px; height: 40px; border-radius: 50%; border: none; background: #b2ebf2; font-size: 20px;">-</button>
            <span id="water-count" style="font-size: 35px; font-weight: bold; color: #007c91;">0</span>
            <button onclick="changeWater(1)" style="width: 40px; height: 40px; border-radius: 50%; border: none; background: #4dd0e1; font-size: 20px;">+</button>
        </div>
    </div>
<div style="text-align: center; padding: 20px; max-width: 400px; margin: auto;">
    <h3 style="color: #008080;">📝 Aaj ki Diary/Note Likhein</h3>
    <form onsubmit="handleFormSubmit(event)">
        <input type="text" id="p-name" placeholder="Naam likhein" required 
               style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #008080;">
        
        <input type="text" id="p-phone" placeholder="Mobile Number" required 
               style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #008080;">
        
        <textarea id="p-note" placeholder="Apni pareshani ya note yahan likhein..." required 
                  style="width: 100%; padding: 10px; height: 100px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #008080; font-family: sans-serif;"></textarea>
        
        <button type="submit" style="background: #008080; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">
            Save Note to Diary
        </button>
    </form>

   
<div>
    <button><a href="index.html" style="background-color: yellow;color: black">WAPAS  HOME  PAGE PER  Jayein</a></button>
    </div>

<script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  
  const firebaseConfig = {
    apiKey: "AIzaSyDOGUjFOHfRrCqnyRdLiQYMreN67U9_gAg",
    authDomain: "carepulse-63d5c.firebaseapp.com",
    projectId: "carepulse-63d5c",
    storageBucket: "carepulse-63d5c.firebasestorage.app",
    messagingSenderId: "955333385466",
    appId: "1:955333385466:web:38e7c6106744c46c2cfd43",
    measurementId: "G-VLE3CXBM5Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- Water Tracker Logic ---
  let waterGlasses = 0;
  window.changeWater = function(amount) {
    waterGlasses += amount;
    if (waterGlasses < 0) waterGlasses = 0;
    document.getElementById('water-count').innerText = waterGlasses;
  };

  // --- Diary Note Save Function (Global) ---
  window.handleFormSubmit = async function(event) {
    if (event) event.preventDefault(); // Page refresh rokne ke liye

    // Form elements se data lena
    const name = document.getElementById('p-name').value;
    const phone = document.getElementById('p-phone').value;
    const note = document.getElementById('p-note').value;
    const waterCount = document.getElementById('water-count').innerText;

    if (!name || !note) {
      alert("Pehle Naam aur Note toh bharo! 😊");
      return;
    }

    try {
      // Firebase mein entry save karna
      await addDoc(collection(db, "healthDiary"), {
        patientName: name,
        phoneNumber: phone,
        symptoms: note,
        waterGlasses: waterCount,
        timestamp: new Date().toLocaleString()
      });

      // Safalta ka message!
      alert("Aaj ka health record save ho gaya! ✅");
      
      // Form reset karein
      document.getElementById('p-name').value = "";
      document.getElementById('p-phone').value = "";
      document.getElementById('p-note').value = "";

    } catch (e) {
      console.error("Save Error: ", e);
      alert("Save nahi ho paya: " + e.message);
    }
  };
</script>
</body>
</html>
