<!DOCTYPE html>
<html>
    <head>
        <title style="color: brown;background-color: yellow;"> MEDICINE REMINDER </title> 
    </head>
<body>
    <div id="medicine-dashboard" style="padding: 20px; text-align: center;">
    <h2 style="color: #008080;">💊 Mera Dawai Reminder</h2>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="medName" placeholder="Dawai ka naam" style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
        <input type="time" id="medTime" style="padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
        <button onclick="addMedicine()" style="padding: 12px 25px; background: #00C48C; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Set Alarm</button>
    </div>

    <div id="medicine-list" style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
        </div>
</div>

<div id="alarm-popup" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border: 5px solid red; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 99999; text-align: center;">
    <h1 style="color: red; font-size: 40px;">⏰ DAWAI KA WAQT!</h1>
    <p id="alert-med-name" style="font-size: 30px; font-weight: bold;"></p>
   <div id="alarm-popup" style="display:none; ...">
    <button id="whatsapp-send-btn" onclick="sendWhatsAppNow()" style="padding: 15px 30px; background: #25D366; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> Family ko Alert Bhein
    </button>

    <button onclick="stopAlarm()" style="padding: 15px 30px; background: #ff4444; ...">Dawai Le Li (Stop)</button>
</div>
    
   <button onclick="stopAlarm()" style="padding: 20px; background: red; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%;">
    DAWAI LE LI (STOP)
</button>
    <audio id="alarm-sound" loop preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
</audio>
</div>
<button><a href="index.html" style="background-color: yellow;color: black;"><--GO BACK TO HOME PAGE</a></button>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 1. Firebase Config (Paste your actual config here)
  const firebaseConfig = {
    apiKey: "AIzaSyD0GUjFOHfRrCqnyRdLiQYMreN67U9_gAg",
  authDomain: "carepulse-63d5c.firebaseapp.com",
  projectId: "carepulse-63d5c",
  storageBucket: "carepulse-63d5c.firebasestorage.app",
  messagingSenderId: "955333385466",
  appId: "1:955333385466:web:38e7c6106744c46c2cfd43",
  measurementId: "G-VLE3CXBM5Q"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allMedicines = [];
  let alarmPlayedFor = ""; // Duplicate alarm rokne ke liye

  // 2. Save Medicine to Firebase
  window.addMedicine = async function() {
    const name = document.getElementById('medName').value;
    const time = document.getElementById('medTime').value;

    if (!name || !time) return alert("Pehle naam aur time bharein!");

    try {
        await addDoc(collection(db, "medicineReminders"), {
            name: name,
            time: time,
            timestamp: new Date()
        });
        alert("Alarm set ho gaya!");
        document.getElementById('medName').value = "";
        document.getElementById('medTime').value = "";
    } catch (e) {
        alert("Firebase Error: " + e.message);
    }
  };

  // 3. Real-time Listen to Medicines
  onSnapshot(query(collection(db, "medicineReminders"), orderBy("time")), (snapshot) => {
    allMedicines = [];
    const listDiv = document.getElementById('medicine-list');
    listDiv.innerHTML = "";
    
    snapshot.forEach((doc) => {
        const data = doc.data();
        allMedicines.push(data);
        listDiv.innerHTML += `
            <div style="background: #e0f2f1; border-left: 5px solid #00C48C; padding: 15px; width: 90%; max-width: 400px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <strong style="font-size: 18px;">${data.name}</strong>
                <span style="color: #555; font-weight: bold;">⏰ ${data.time}</span>
            </div>`;
    });
  });

  // 4. THE ALARM ENGINE (Har 1 second mein check karega)
  setInterval(() => {
    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0');

    allMedicines.forEach(med => {
        if (med.time === currentTime && alarmPlayedFor !== currentTime) {
            triggerAlarm(med.name);
            alarmPlayedFor = currentTime; 
        }
    });
  }, 1000);

  // Is function ko replace karein
let currentMedicineForAlert = "";

function triggerAlarm(name) {
    currentMedicineForAlert = name; // Medicine ka naam save karein
    const popup = document.getElementById('alarm-popup');
    const sound = document.getElementById('alarm-sound');
    
    document.getElementById('alert-med-name').innerText = name;
    popup.style.display = 'block';
    sound.play();

    // Option: Agar aap chahte hain ki 3 second baad WhatsApp apne aap khul jaye (Prompt)
    setTimeout(() => {
        if(popup.style.display === 'block') {
            sendWhatsAppNow();
        }
    }, 3000);
}
window.stopAlarm = function() {
    const popup = document.getElementById('alarm-popup');
    const sound = document.getElementById('alarm-sound');

    // 1. Popup chhupao
    popup.style.display = 'none';

    // 2. Sound band karo aur shuruat par le jao
    if (sound) {
        sound.pause();
        sound.currentTime = 0; 
    }

    // 3. Flag reset karein taaki agle minute phir se na bajne lage
    // (Jaisa humne pehle 'alarmPlayedFor' banaya tha)
    console.log("Alarm stopped by user.");
};
window.sendWhatsAppNow = function() {
    const familyNumber = "9454523855"; // Apna number country code ke saath likhein
    const text = `🚨 *CarePulse Alert*: Dada/Dadi ki dawai (${currentMedicineForAlert}) ka samay ho gaya hai. Kripya check karein!`;
    
    const whatsappUrl = `https://api.whatsapp.com/send?phone=${familyNumber}&text=${encodeURIComponent(text)}`;
    
    // Naye tab mein open karega aur message ready milega
    window.open(whatsappUrl, '_blank');
};
 window.stopAlarm = function() {
    const popup = document.getElementById('alarm-popup');
    const sound = document.getElementById('alarm-sound');

    // 1. Popup chhupao
    popup.style.display = 'none';

    // 2. Sound band karo aur shuruat par le jao
    if (sound) {
        sound.pause();
        sound.currentTime = 0; 
    }

    // 3. Flag reset karein taaki agle minute phir se na bajne lage
    // (Jaisa humne pehle 'alarmPlayedFor' banaya tha)
    console.log("Alarm stopped by user.");
};



</script>
</body>
</html>
